,23,536870918]],[&quot;^16&quot;,[30,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[30,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[30,&quot;^;&quot;,&quot;~u62d79f54-993f-4751-9a71-99b40251cdcb&quot;,536870918]],[&quot;^16&quot;,[31,&quot;^R&quot;,&quot;&quot;,536870918]],[&quot;^16&quot;,[31,&quot;^P&quot;,&quot;^17&quot;,536870918]],[&quot;^16&quot;,[31,&quot;^F&quot;,33,536870918]],[&quot;^16&quot;,[31,&quot;^Y&quot;,23,536870918]],[&quot;^16&quot;,[31,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[31,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[31,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[31,&quot;^;&quot;,&quot;~u62d79f54-569e-42bf-8e74-f96a34e77733&quot;,536870918]],[&quot;^16&quot;,[32,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作义大利面酱&lt;/p&gt;\\n下蒜片，上色後滤出，下培根炒上色，火不能太大，加60CC白酒，下洋葱，油不会渗出，一路等白酒酒精蒸发，加高汤240CC，炒好了下面条，加S/P，下鲜奶油90CC，收汁收的差不多时，下起司粉一大茶匙，下10G奶油，离火用余温拌炒，最後再用余温拌一颗蛋黄，最後一咪咪起司粉跟黑胡椒装饰&quot;,536870918]],[&quot;^16&quot;,[32,&quot;^P&quot;,&quot;^17&quot;,536870918]],[&quot;^16&quot;,[32,&quot;^F&quot;,28,536870918]],[&quot;^16&quot;,[32,&quot;^Y&quot;,23,536870918]],[&quot;^16&quot;,[32,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[32,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[32,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[32,&quot;^;&quot;,&quot;~u62d79f54-639b-488a-8616-54b82a95f9c5&quot;,536870918]],[&quot;^16&quot;,[33,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作巧达汤汤底&lt;/p&gt;\\n冷锅下奶油，融化後加入1:1的面粉拌匀，起泡泡的时候关掉火加入高汤600CC，慢慢下，先加120cc，再慢慢加完，确定拌匀以後再开火，煮大概10-15分钟，最後加60CC动物性鲜奶油，如果当初有加够多蔬菜煮高汤，就不用加糖，反之&quot;,536870918]],[&quot;^16&quot;,[33,&quot;^P&quot;,&quot;^17&quot;,536870918]],[&quot;^16&quot;,[33,&quot;^F&quot;,26,536870918]],[&quot;^16&quot;,[33,&quot;^Y&quot;,23,536870918]],[&quot;^16&quot;,[33,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[33,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[33,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[33,&quot;^;&quot;,&quot;~u62d79f54-0610-47e1-978f-40575b7256a9&quot;,536870918]],[&quot;^16&quot;,[34,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;额外知识点&lt;/p&gt;\\ns/p ＝ salt and pepper\\n马铃薯台湾常见三种，红皮适合bbq，黄皮适合做薯泥，紫色很少见\\n东坡肉炖完以後可以拿去冷冻，水结晶後会让肉更软嫩\\n电锅温度140度，内锅要用不锈钢，蒸东西的架子下面要架空，炖东西就不用，等於名火在下面加热\\n蒸鱼要热蒸(所以先倒水进去让电锅热)才把鱼放进去重新外锅加水，举例一斤鲈鱼大概用炉子蒸8-10分钟，用电锅大概要加15%时间\\n牛排回温到室温後再煎好吃(2-2.5公分)，太薄的话可以考虑用炙烧的\\n大块的肉烤完要放凉，例如1.8公斤的鸡要烤1.5小时，至少要拿出来静置15分钟\\n炸冷冻薯条180度，炸猪排150度一炸，180度二炸\\n用气炸锅务必要开抽油烟机\\n猪肉，鸡肉白肉。鸭肉，鹅肉，鸵鸟肉，红肉&quot;,536870918]],[&quot;^16&quot;,[34,&quot;^P&quot;,&quot;^17&quot;,536870918]],[&quot;^16&quot;,[34,&quot;^F&quot;,40,536870918]],[&quot;^16&quot;,[34,&quot;^Y&quot;,23,536870918]],[&quot;^16&quot;,[34,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[34,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[34,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[34,&quot;^;&quot;,&quot;~u62d79f54-02ed-4508-85e4-646b01b09ba5&quot;,536870918]],[&quot;^16&quot;,[35,&quot;^R&quot;,&quot;&quot;,536870918]],[&quot;^16&quot;,[35,&quot;^P&quot;,&quot;^17&quot;,536870918]],[&quot;^16&quot;,[35,&quot;^F&quot;,39,536870918]],[&quot;^16&quot;,[35,&quot;^Y&quot;,23,536870918]],[&quot;^16&quot;,[35,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[35,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[35,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[35,&quot;^;&quot;,&quot;~u62d79f54-d39e-45a8-a47a-edd747e0bd83&quot;,536870918]],[&quot;^16&quot;,[36,&quot;^R&quot;,&quot;| **菜單名稱** | **蛋汁奶油培根義大利麵** | **菜單名稱** | **培根奶油巧達濃湯 ** |\\n|---|---|---|---|\\n| 材料 | 重量/單位 | 材料 | 重量/單位  |\\n| 培根 | 100g | 洋蔥 | 1/2ea  |\\n| 洋蔥碎 | 1/4ea | 培根 | 1/4ea  |\\n| 蒜片 | 2ea | 西芹 | 0.5ea  |\\n| 巴西利 | 15g | 紅蘿蔔 | 1/4ea  |\\n| 蛋黃 | 2ea | 洋芋( 馬鈴薯) | 0.5ea  |\\n| 鮮奶油(動物性) | 100cc | 吐司麵包 | 1片  |\\n| 帕馬森起司粉 | 2T | 月桂葉 | 1-2ea  |\\n| 白酒 | 1/4CUP |  |   |\\n| 高湯 | 適量 | 奶油 | 50g  |\\n| S/P(盐胡椒) | 適量 | 中粉 | 50g  |\\n| 義大利麵條 | 250g | 鮮奶油 | 200cc  |\\n|  |  | 雞高湯 | 600cc  |\\n|  |  | S/P(盐胡椒) | 適量  |&quot;,536870918]],[&quot;^16 6&quot;,[39,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[39,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[39,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[39,&quot;^;&quot;,&quot;~u62d79f54-c179-460f-be75-ac03c8fd200e&quot;,536870918]],[&quot;^16&quot;,[40,&quot;^R&quot;,&quot;&quot;,536870918]],[&quot;^16&quot;,[40,&quot;^P&quot;,&quot;^17&quot;,536870918]],[&quot;^16&quot;,[40,&quot;^F&quot;,32,536870918]],[&quot;^16&quot;,[40,&quot;^Y&quot;,23,536870918]],[&quot;^16&quot;,[40,&quot;^V&quot;,23,536870918]],[&quot;^16&quot;,[40,&quot;^U&quot;,23,536870918]],[&quot;^16&quot;,[40,&quot;^18&quot;,true,536870918]],[&quot;^16&quot;,[40,&quot;^;&quot;,&quot;~u62d79f54-0093-4113-ae89-d3f639fb9bc5&quot;,536870918]],[&quot;^16&quot;,[42,&quot;^L&quot;,1657075955983,536871021]],[&quot;^16&quot;,[42,&quot;^O&quot;,20220626,536870920]],[&quot;^16&quot;,[42,&quot;^@&quot;,true,536870920]],[&quot;^16&quot;,[42,&quot;^Z&quot;,&quot;jun 26th, 2022&quot;,536870920]],[&quot;^16&quot;,[42,&quot;^12&quot;,&quot;Jun 26th, 2022&quot;,536870920]],[&quot;^16&quot;,[42,&quot;^B&quot;,1657078434428,536871021]],[&quot;^16&quot;,[42,&quot;^;&quot;,&quot;~u62d79f55-5485-4d8d-8d71-520e314e932a&quot;,536870920]],[&quot;^16&quot;,[43,&quot;^R&quot;,&quot;&quot;,536870920]],[&quot;^16&quot;,[43,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[43,&quot;^F&quot;,56,536870920]],[&quot;^16&quot;,[43,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[43,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[43,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[43,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[43,&quot;^;&quot;,&quot;~u62d79f55-866a-4277-9342-072b5df1a6fa&quot;,536870920]],[&quot;^16&quot;,[44,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作汉堡肉排&lt;/p&gt;\\n熱鍋炒香洋蔥丁，加到牛絞肉，原因是希望有洋蔥香但不要水分以免肉排的空洞，吵到稍微變色大概八分鐘吧，降溫後加入牛絞肉中，吐司丁也加入(漢堡的吐司丁加80克鮮奶)，黑胡椒些許，鹽些許，義大利綜合香料，用手揉均勻，摔打他讓他更緊實，最後一開四分成四坨汉堡肉，煎漢堡肉，鍋熱潤鍋，下鍋前儘量壓扁，下锅後受熱會收縮，翻面煎熟，中間不要壓以防他散掉，中心溫度有75度代表全熟，或用叉子叉一下沒有血水跑出也是判斷方式，起鍋前放上起司片撈起&quot;,536870920]],[&quot;^16&quot;,[44,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[44,&quot;^F&quot;,54,536870920]],[&quot;^16&quot;,[44,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[44,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[44,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[44,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[44,&quot;^;&quot;,&quot;~u62d79f55-97a6-4493-802f-ca1354b68eab&quot;,536870920]],[&quot;^16&quot;,[45,&quot;^R&quot;,&quot;[[632_Cook_Recipe]] &lt;p style=\\&quot;color:grey\\&quot;&gt;第四堂課20220626牛肉漢堡，蘑菇浓汤，凯萨沙拉&lt;/p&gt;&quot;,536870920]],[&quot;^16&quot;,[45,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[45,&quot;^F&quot;,42,536870920]],[&quot;^16&quot;,[45,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[45,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[45,&quot;^U&quot;,24,536870920]],[&quot;^16&quot;,[45,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[45,&quot;^H&quot;,24,536870920]],[&quot;^16&quot;,[45,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[45,&quot;^;&quot;,&quot;~u62d79f55-4777-4d4b-877b-d737dcaddbe5&quot;,536870920]],[&quot;^16&quot;,[46,&quot;^R&quot;,&quot;&quot;,536870920]],[&quot;^16&quot;,[46,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[46,&quot;^F&quot;,51,536870920]],[&quot;^16&quot;,[46,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[46,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[46,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[46,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[46,&quot;^;&quot;,&quot;~u62d79f55-202e-42a4-9e59-b536555b3900&quot;,536870920]],[&quot;^16&quot;,[47,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;组装汉堡&lt;/p&gt;\\n漢堡皮抹酱，美乃滋加上1/10的黃芥末放到塑膠袋裡面角落擠好備用，美生菜切絲準備好\\n漢堡的洋蔥也可以炒，要炒大概15分鐘炒到像是洋蔥湯的洋蔥大概浅咖啡色的狀態\\n麵包烤起來把切開麵包抹奶油，再煎一下中間抹奶油那面煎上色微焦，擠上美乃滋，生菜絲，番茄放上，肉排起司放上，洋蔥上蓋，牙籤固定\\n附餐的帶皮馬鈴薯切塊，加紅椒粉，培根油或者沙拉油，黑胡椒，可以跟鸡肉一起烤(放烤箱烤，160度12分鐘)，烤出來的馬鈴薯丁，剩下的洋蔥，培根，鹽胡椒，一點義式香料，煎到馬鈴薯上色\\n![image.png](../assets/image_1656396523174_0.png)&quot;,536870920]],[&quot;^16&quot;,[47,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[47,&quot;^F&quot;,53,536870920]],[&quot;^16&quot;,[47,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[47,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[47,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[47,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[47,&quot;^;&quot;,&quot;~u62d79f55-294c-4296-b339-a386101b8cd8&quot;,536870920]],[&quot;^16&quot;,[48,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作蘑菇浓汤&lt;/p&gt;\\n蘑菇湯開始煮，先下蘑菇乾炒不要加油，炒香後加一大踢的油炒杏鮑菇，接著再下香菇，吵到水份有點收乾，加洋蔥，百里香一絲絲，一塊奶油，加蒜碎跟西芹碎，兩大茶匙白酒，炒到沒酒味，加500CC雞高湯，煮大概20分鐘，放微凉後放入果汁機打，一開始不要放太多會噴，太濃稠也會噴，太濃可以加高湯調整，大概要打五分鐘，起來後加120CC鮮奶油，調味，再次炒一下裝飾配料香菇小火煎上色，蘑菇湯裝盤，放上裝飾香菇，培根，巴西利，一點點橄欖油淋上面&quot;,536870920]],[&quot;^16&quot;,[48,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[48,&quot;^F&quot;,55,536870920]],[&quot;^16&quot;,[48,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[48,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[48,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[48,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[48,&quot;^;&quot;,&quot;~u62d79f55-5628-49c2-9e4d-5e5d1fe02075&quot;,536870920]],[&quot;^16&quot;,[49,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;事前准备&lt;/p&gt;\\n蘑菇湯的乾香菇泡熱水（用牛肝菌菇也可以取代），軟了用剪刀切掉蒂頭，切片\\n沙拉生菜泡冰塊水备用\\n巴西蘑菇有土要洗，切0.3公分厚片\\n杏鮑菇就儘量不要洗，一開四，切丁就好，後續炒完會用果汁機打成濃湯，所以刀工只要不要太大塊就好\\n洋蔥湯的半顆切洋蔥碎，另外漢堡肉半顆也切洋蔥碎，剩下一顆夹汉堡的洋蔥逆紋切絲，宽一點約0.4公分寬，會比較不辛辣\\n蘑菇湯蒜頭一顆切蒜碎\\n蘑菇湯西芹，大概兩食指長就好，切碎，因為會果汁機打所以不用去皮，如果是吃沙拉就要去皮口感较好\\n馬鈴薯切塊，泡水\\n沙拉跟湯的培根兩三片食指長，約切像叉烧店的燒肉的塊狀\\n沙拉的烤雞胸，把脂肪跟白色組織修掉，灑上迷迭香，匈牙利紅椒粉，黑胡椒，鹽1/4小茶匙，糖一大茶匙（這樣才會嫩），沙拉油，抓醃\\n牛絞肉3:豬肉1這樣絞肉，豬肉的油酯比較多，豬肉的肥瘦比大概3:7，這是老師这次的配方，絞肉买回來一定要自己再剁一剁，老師大概來回剁了五次\\n漢堡番茄一顆逆紋厚片，半顆沙拉的番茄開八瓣\\n巴西莉，梗不要，只要葉子，切碎，裝飾用\\n沙拉小黃瓜削三條皮增加適口性，切斜片&quot;,536870920]],[&quot;^16&quot;,[49,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[49,&quot;^F&quot;,50,536870920]],[&quot;^16&quot;,[49,&quot;^Y&quot;,42,536870920]],[&quot;^1 0分鐘，把酵母跟15克糖加進麵粉，加一顆雞蛋，用叉子攪拌，手開始抓有點絲狀有點濕潤度，這時再加4.5g鹽，太乾可以加一點水补一下，先揉成團，奶油回室溫才能揉進去，\\n麵團大概會發到兩倍大，戳了不會回彈大概就差不多。一開四，往內搓揉包圆，拍打紧实，放到烤盤間距要抓，封保鮮膜讓她再發酵，大概又過20分鐘，打一顆雞蛋，上方抹上蛋液，撒一點生白芝麻，180度，烤20分鐘&quot;,536870920]],[&quot;^16&quot;,[51,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[51,&quot;^F&quot;,43,536870920]],[&quot;^16&quot;,[51,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[51,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[51,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[51,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[51,&quot;^;&quot;,&quot;~u62d79f55-1ac7-4fb3-9ae6-ef3eee59784a&quot;,536870920]],[&quot;^16&quot;,[52,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;凯萨沙拉制作&lt;/p&gt;\\n凱撒沙拉，(凱撒概念三寶麵包丁，起司粉，培根)，熱鍋相當熱以後下油關火下雞肉，開火把表面煎上色，表面微微碳香微焦，放烤箱烤，160度12分鐘\\n培根小火煎，煎到酥脆，大概至少煎了15分鐘\\n凱撒沙拉醬，酸辣鹹缺一不可，酸檸檬，辣蒜頭跟tabasco，提魚跟鹽鹹，蒜碎切細，酸豆切碎，鯷魚剁細，放到美乃滋中，Tabasco1克，梅林醬2公克，法式黃芥末醬1匙，檸檬汁八分之一瓣，三公克起司粉\\n凱撒裝盤\\n1.擺盤先抹美乃滋在底部，美生菜擦乾立在上面，側邊擺小黃瓜番茄\\n2.另一種現拌，先把所有美生菜都手撥放進鋼盆加凱薩醬進去用夾子拌，上面生菜完成後，放上培根跟麵包丁，斜切的烤好雞肉，最後撒上起司粉\\n![image.png](../assets/image_1656396511590_0.png)&quot;,536870920]],[&quot;^16&quot;,[52,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[52,&quot;^F&quot;,46,536870920]],[&quot;^16&quot;,[52,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[52,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[52,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[52,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[52,&quot;^;&quot;,&quot;~u62d79f55-3a36-4906-b5f4-194e7b8fae5f&quot;,536870920]],[&quot;^16&quot;,[53,&quot;^R&quot;,&quot;&quot;,536870920]],[&quot;^16&quot;,[53,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[53,&quot;^F&quot;,48,536870920]],[&quot;^16&quot;,[53,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[53,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[53,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[53,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[53,&quot;^;&quot;,&quot;~u62d79f55-3c6a-4deb-ba1a-f5172d10f3c4&quot;,536870920]],[&quot;^16&quot;,[54,&quot;^R&quot;,&quot;&quot;,536870920]],[&quot;^16&quot;,[54,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[54,&quot;^F&quot;,52,536870920]],[&quot;^16&quot;,[54,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[54,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[54,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[54,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[54,&quot;^;&quot;,&quot;~u62d79f55-ab26-4e3f-8de3-bd4ba9c4f8a3&quot;,536870920]],[&quot;^16&quot;,[55,&quot;^R&quot;,&quot;&quot;,536870920]],[&quot;^16&quot;,[55,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[55,&quot;^F&quot;,44,536870920]],[&quot;^16&quot;,[55,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[55,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[55,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[55,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[55,&quot;^;&quot;,&quot;~u62d79f55-f95c-44f0-84e2-d62762e45f07&quot;,536870920]],[&quot;^16&quot;,[56,&quot;^R&quot;,&quot;吐司一片給濃湯去邊切丁，一片切丁給沙拉，切一顆蒜碎，奶油兩塊大概10g，一點巴西莉末，鹽適量拌進去，放烤箱烤&quot;,536870920]],[&quot;^16&quot;,[56,&quot;^P&quot;,&quot;^17&quot;,536870920]],[&quot;^16&quot;,[56,&quot;^F&quot;,49,536870920]],[&quot;^16&quot;,[56,&quot;^Y&quot;,42,536870920]],[&quot;^16&quot;,[56,&quot;^V&quot;,42,536870920]],[&quot;^16&quot;,[56,&quot;^U&quot;,42,536870920]],[&quot;^16&quot;,[56,&quot;^18&quot;,true,536870920]],[&quot;^16&quot;,[56,&quot;^;&quot;,&quot;~u62d79f55-0b46-471d-8d69-75322bfda734&quot;,536870920]],[&quot;^16&quot;,[58,&quot;^L&quot;,1657075956096,536871021]],[&quot;^16&quot;,[58,&quot;^O&quot;,20220625,536870922]],[&quot;^16&quot;,[58,&quot;^@&quot;,true,536870922]],[&quot;^16&quot;,[58,&quot;^Z&quot;,&quot;jun 25th, 2022&quot;,536870922]],[&quot;^16&quot;,[58,&quot;^12&quot;,&quot;Jun 25th, 2022&quot;,536870922]],[&quot;^16&quot;,[58,&quot;^B&quot;,1657519951899,536871021]],[&quot;^16&quot;,[58,&quot;^;&quot;,&quot;~u62d79f55-b122-49e3-99a3-98b6145b8eb0&quot;,536870922]],[&quot;^16&quot;,[59,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作法式吐司&lt;/p&gt;\\n三顆雞蛋配兩杯480cc牛奶，加一點點香草精，打散以後浸麵包，稍微壓過，沾好以後撈出靜置\\n煎法式吐司，因為比較厚所以煎上色完以後就用烤箱让它中间透，熱鍋直到熱排斥效應，倒油潤鍋，把多餘的油倒掉，下吐司先煎漂亮的面，然後翻面，側邊也要滾邊因為也有生蛋液，烤之前上面可以放奶油，不用抹開，烤大概三分鐘，160度，好了中央會澎起來（如果沒澎代表中間吐司沒吃到蛋液，要注意中間是否也有吃到），出爐切三角形，撒糖粉放薄荷葉裝飾，比較新的摆盘方式，加裝飾果醬，薄荷葉，蜂蜜，糖分&quot;,536870922]],[&quot;^16&quot;,[59,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[59,&quot;^F&quot;,76,536870922]],[&quot;^16&quot;,[59,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[59,&quot;^V&quot;,58,536870922]],[&quot;^16&quot;,[59,&quot;^U&quot;,58,536870922]],[&quot;^16&quot;,[59,&quot;^18&quot;,true,536870922]],[&quot;^16&quot;,[59,&quot;^;&quot;,&quot;~u62d79f55-b096-483e-be63-550e928e2340&quot;,536870922]],[&quot;^16&quot;,[60,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;食材处理&lt;/p&gt;\\n法式洋蔥湯的焗烤麵包，依照湯碗大小切片，先把麵包烤乾，再上起司條後再放进去第二次焗烤至微焦\\n洋蔥汤的洋葱順紋切絲，可以吃到洋蔥絲狀口感，逆紋切在煮的过程会都化光\\n紅蔥頭逆紋切片，因為纖維比較粗\\n蒜頭切丁\\n潛艇堡生菜 可以用廣東a生菜，羅曼取代掉，切絲不要太細会氧化太快，切完泡冰水\\n潛艇堡番茄，蒂頭去掉，逆紋切成0.5公分厚，先切圓片再考慮太大是否對開\\n潛艇堡洋蔥也是順紋切絲，節瓜切一公分厚度\\n潛艇堡杏鮑菇切成1.5公分的片，可以頭尾先修一點，才好放，中間比較寬的那面，斜刀劃0.5公分寬的格子紋\\n潛艇堡培根，三片再對半，大概一公分厚的培根，泡熱水20分鐘去鹽&quot;,536870922]],[&quot;^16&quot;,[60,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[60,&quot;^F&quot;,75,536870922]],[&quot;^16&quot;,[60,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[60,&quot;^V&quot;,58,536870922]],[&quot;^16&quot;,[60,&quot;^U&quot;,58,536870922]],[&quot;^16&quot;,[60,&quot;^18&quot;,true,536870922]],[&quot;^16&quot;,[60,&quot;^;&quot;,&quot;~u62d79f55-54be-45d1-adc9-6b27c8c67c67&quot;,536870922]],[&quot;^16&quot;,[61,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作潜艇堡的料&lt;/p&gt;\\n潛艇堡的料，熱鍋後離火下油先炒菇，香了再下洋蔥，加點鹽黑胡椒調味，炒透不要炒上色\\n潛艇堡杏鮑菇節瓜調味，鹽巴白胡椒一點點，橄欖油拌油，大概3大茶匙的油，(瓜類菇類油需要下比較多，但如果是甜椒那種就不太吃油)\\n潛艇堡先煎培根，熱鍋後下油，培根要好吃，用真肉的要煎到表面恰恰，起鍋吸油\\n可以用這個油繼續補油然後煎節瓜跟杏鮑菇，煎的時候可以用鐵盤壓上面讓他上色，兩面煎熟，加10g奶油，奶油煎到有點起泡，有榛果香氣時起鍋吸油\\n潛艇堡沾醬，美乃滋3大茶匙，一小茶匙黃芥末蒜泥，檸檬汁約1/8瓣就好，少許鹽，少許白胡椒，少許檸檬皮\\n潛艇堡麵包，蒸烤箱设定95%水分，180度烤兩分鐘，但沒這麼厲害的烤箱就只能加減噴水烤用经验判断，上下蓋都擠美乃滋，下蓋開始依序夾生菜，然後夾番茄，然後放起司，然後杏鮑菇，然後培根，然後節瓜，然後洋蔥，最後斜放上上蓋&quot;,536870922]],[&quot;^16&quot;,[61,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[61,&quot;^F&quot;,63,536870922]],[&quot;^16&quot;,[61,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[61,&quot;^V&quot;,58,536870922]],[&quot;^16&quot;,[61,&quot;^U&quot;,58,536870922]],[&quot;^16&quot;,[61,&quot;^18&quot;,true,536870922]],[&quot;^16&quot;,[61,&quot;^;&quot;,&quot;~u62d79f55-2cd4-479d-8460-4fbc61719417&quot;,536870922]],[&quot;^16&quot;,[62,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;事前准备&lt;/p&gt;\\n法式麵包當天出爐不是最好吃的，熟成一兩天比較適合\\n褐色高湯就是把食材先拿去炒了才去炖煮，可以先去掉蔬菜的腥味，炒出甜味的焦化反應，洋蔥西芹紅蘿蔔蒜苗四寶，高汤不能加有澱粉的蔬菜如马铃薯，洋蔥湯的靈魂是這鍋，三副雞骨加一顆洋蔥烤到恰恰，再丟進去煮高汤&quot;,536870922]],[&quot;^16&quot;,[62,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[62,&quot;^F&quot;,73,536870922]],[&quot;^16&quot;,[62,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[62,&quot;^V&quot;,58,536870922]],[&quot;^16&quot;,[62,&quot;^U&quot;,58,536870922]],[&quot;^16&quot;,[62,&quot;^18&quot;,true,536870922]],[&quot;^16&quot;,[62,&quot;^;&quot;,&quot;~u62d79f55-af7d-4df3-8f42-def5ac4b3c80&quot;,536870922]],[&quot;^16&quot;,[63,&quot;^R&quot;,&quot;&quot;,536870922]],[&quot;^16&quot;,[63,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[63,&quot;^F&quot;,72,536870922]],[&quot;^16&quot;,[63,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[63,&quot;^V&quot;,58,536870922]],[&quot;^16&quot;,[63,&quot;^U&quot;,58,536870922]],[&quot;^16&quot;,[63,&quot;^18&quot;,true,536870922]],[&quot;^16&quot;,[63,&quot;^;&quot;,&quot;~u62d79f55-b936-483e-b937-12fc6fca6255&quot;,536870922]],[&quot;^16&quot;,[64,&quot;^R&quot;,&quot;&quot;,536870922]],[&quot;^16&quot;,[64,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[64,&quot;^F&quot;,59,536870922]],[&quot;^16&quot;,[64,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[64,&quot;^V&quot;,58,536870922]],[&quot;^16&quot 79f55-fc8f-457a-87b5-1ea0f3e3f201&quot;,536870922]],[&quot;^16&quot;,[72,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作洋葱汤的汤&lt;/p&gt;\\n洋蔥湯的炒洋蔥（兩顆半），冷鍋冷油開始炒，大火三大茶匙沙拉油炒，开始出聲音時候火轉小一點，沒聲音火又可以大一點，因為大火一直炒，可能發生焦了卻沒透，等洋蔥軟了一路上色後才下紅蔥頭(至少二十分钟)，鍋邊慢慢煮五分鐘开始锅边會產生焦焦的顏色離火把它刮下來，（刮只要刮微焦的部分，全焦的就不要刮进来了，刮不下來時可以分批慢慢加白酒60CC下去）。繼續炒可能十五分鐘，加蒜碎，繼續炒可能十分鐘會變咖啡色，最終总共炒大概40分鐘(長時間加熱不要用初榨橄欖油)，下乾燥香料百里香月桂葉進去拌炒，加半小茶匙的白胡椒跟胡椒粉，换到深锅，洋蔥湯加一大茶匙麵粉下去作為勾芡用，然後加入高湯1000cc開始煮，大概煮40分鐘，过程中间捞掉上层浮末，煮完後月桂葉，百里香從湯裡面撈起，開始調味，視情況加水稀释，（不用加糖），加鹽，白胡椒，桂林牌梅林醬1/2大茶匙，起鍋前加5CC玉山白蘭地提味，此时将洋蔥湯的法國麵包，上火烤過，加起司絲加一點點凱莉茴香，加一點起司粉，湯加到九分滿，放到汤上，上面放上起司麵包拿去上火焗烤融化即可&quot;,536870922]],[&quot;^16&quot;,[72,&quot;^P&quot;,&quot;^17&quot;,536870922]],[&quot;^16&quot;,[72,&quot;^F&quot;,71,536870922]],[&quot;^16&quot;,[72,&quot;^Y&quot;,58,536870922]],[&quot;^16&quot;,[72,&quot;^V&quot;,58,536870922]],[&quot;^16&quot;,[72,&quot;^U&quot;,58,536870922]],[&quot;^16&quot;,[72,&quot;^18&quot;,true,536870922]],[&quot;^16&quot;,[72,&quot;^;&quot;,&quot;~u62d79f55-c60e-4a51-90d0-b5f3b9201b1d&quot;,536870922]],[&quot;^16&quot;,[73,&quot;^R&quot;,&quot;| **菜單名稱** | **香榭厚煎法式吐司** | **菜單名稱** | **法式洋蔥湯** | **菜單名稱** | **法國麵包潛艇堡 ** |\\n|---|---|---|---|---|---|\\n| 厚片土司 | 4片 | 洋蔥絲 | 2ea | 法國麵包 | 1條  |\\n| 雞蛋 | 2顆 | 紅蔥頭片 | 50g | 洋蔥圈or洋蔥絲 | 1/4ea  |\\n| 牛奶 | 1杯 | 蒜碎 | 15g | 廣東Aor美生菜絲 | 適量  |\\n| 香草精 |  | 百里香 | 1T | 培根片 | 150g  |\\n|  |  | 月桂葉 | 1ea | 杏鮑菇 | 2條  |\\n|  &lt;span style=\\&quot;color:blue\\&quot;&gt;裝飾&lt;/span&gt;  |  | 白酒or白蘭地 | 60cc | 起司片 | 2片  |\\n| 果醬or新鮮水果 | 適量 | 褐色牛骨or雞骨高湯 | 1000cc | 牛番茄片 | 1顆  |\\n| 糖粉 | 適量 | S/P | 適量 |  |   |\\n| 奶油丁 | 適量 | 梅林 | 適量 |  &lt;span style=\\&quot;color:blue\\&quot;&gt;法式蒜味美乃滋&lt;/span&gt;  |   |\\n| 楓糖or蜂蜜 | 適量 |  |  | 美乃滋 | 4T  |\\n| 薄荷葉 | 適量 |  &lt;span style=\\&quot;color:blue\\&quot;&gt;起司麵包餅&lt;/span&gt;  |  | 熟蒜仁 | 30g  |\\n|  |  | 起司絲 | 適量 | 法式芥未醬 | 1t  |\\n|  |  | 法國麵包or吐司片 | 2片 | S/P | 適量  |\\n|  |  |  |  |  |  |\\n|  |  |  |  |  &lt;span style=\\&quot;color:blue\\&quot;&gt;美乃滋&lt;/span&gt; &quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[83,&quot;^F&quot;,96,536870924]],[&quot;^16&quot;,[83,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[83,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[83,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[83,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[83,&quot;^;&quot;,&quot;~u62d79f55-1105-42cf-b5c8-9a7e46ad101b&quot;,536870924]],[&quot;^16&quot;,[84,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作恩立蛋沾酱&lt;/p&gt;\\n蜂蜜，用平常喝湯的一湯匙，跟檸檬半颗，小罐的優格半罐混在一起，加一點點鹽避免死甜&quot;,536870924]],[&quot;^16&quot;,[84,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[84,&quot;^F&quot;,88,536870924]],[&quot;^16&quot;,[84,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[84,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[84,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[84,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[84,&quot;^;&quot;,&quot;~u62d79f55-9234-433e-b099-2afde6410344&quot;,536870924]],[&quot;^16&quot;,[85,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作义大利面炒料&lt;/p&gt;\\n義大利麵跟塔皮的培根一起炒，熱鍋下油下培根，預計煎到酥酥香香的上色(比预期久，那种乾乾瘪瘪的状态)培根好了接著用培根油炒洋蔥丁，蘑菇一樣先乾炒後續可以加蒜油進來&quot;,536870924]],[&quot;^16&quot;,[85,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[85,&quot;^F&quot;,80,536870924]],[&quot;^16&quot;,[85,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[85,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[85,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[85,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[85,&quot;^;&quot;,&quot;~u62d79f55-606e-4074-bbb6-40fa4bab3997&quot;,536870924]],[&quot;^16&quot;,[86,&quot;^R&quot;,&quot;&quot;,536870924]],[&quot;^16&quot;,[86,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[86,&quot;^F&quot;,91,536870924]],[&quot;^16&quot;,[86,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[86,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[86,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[86,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[86,&quot;^;&quot;,&quot;~u62d79f55-dbef-4578-bf6e-b4229968367b&quot;,536870924]],[&quot;^16&quot;,[87,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作法式鹹派&lt;/p&gt;\\n奶油90g放到室溫，跟中筋麵粉200g拌勻，糖分20g也放入，鹽5g，再打一顆蛋備用，攪一下以後可以用手去捏，一開始一定很鬆散，一定要加蛋或水才會可以有效混合，加了半顆以後覺得可以揉成團就差不多可以捏成團等面团醒15分鐘，等待結束，捏成圓圓一坨，一開八滾圓，壓扁放進塔模內慢慢推薄，塔皮底部用叉子戳一排20個小凹洞以免膨胀起来，放進烤箱160度烤13分鐘，考好起來先脫模，加一點起司，加一點培根，蘑菇，洋蔥，最後上玉米筍跟青花菜，最後加上下面調的鮮奶油醬汁(鮮奶油120CC，鮮奶60CC，1/4小茶匙鹽，起司粉加入九成，剩下一成最後装盘装饰用，一點點黑胡椒，打蛋器打散)，回烤箱烤160度13分鐘完成&quot;,536870924]],[&quot;^16&quot;,[87,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[87,&quot;^F&quot;,92,536870924]],[&quot;^16&quot;,[87,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[87,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[87,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[87,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[87,&quot;^;&quot;,&quot;~u62d79f55-fd2e-414c-a717-3558a6129e12&quot;,536870924]],[&quot;^16&quot;,[88,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作恩立蛋内馅&lt;/p&gt;\\n大火六寸生鐵鍋平底鍋燒熱，热锅後不用下油蘑菇片乾煎至香氣，蘑菇會出水不怕，一路炒到水分減少縮回去，這時候才下油，油熱下洋蔥，用拿筆的姿勢炒到洋蔥半透明（炒洋葱比以前理解的久），加火腿丁，很薄稍微炒一下而已，至此欧姆蛋内馅料准备結束不調味&quot;,536870924]],[&quot;^16&quot;,[88,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[88,&quot;^F&quot;,83,536870924]],[&quot;^16&quot;,[88,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[88,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[88,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[88,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[88,&quot;^;&quot;,&quot;~u62d79f55-274b-4755-8ac7-f0a1373e9d87&quot;,536870924]],[&quot;^16&quot;,[89,&quot;^R&quot;,&quot;&quot;,536870924]],[&quot;^16&quot;,[89,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[89,&quot;^F&quot;,79,536870924]],[&quot;^16&quot;,[89,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[89,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[89,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[89,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[89,&quot;^;&quot;,&quot;~u62d79f55-6726-495c-ad6b-51c73853ab94&quot;,536870924]],[&quot;^16&quot;,[90,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作燙蔬菜&lt;/p&gt;\\n水加鹽，作用是調味並且加速川燙時間，裝飾用的平常炒菜吃的青花菜大概兩分鐘，玉米筍大概30秒到一分鐘後下碎青花菜再大概30秒就可以全部起來冰鎮，不然青花會黃&quot;,536870924]],[&quot;^16&quot;,[90,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[90,&quot;^F&quot;,87,536870924]],[&quot;^16&quot;,[90,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[90,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[90,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[90,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[90,&quot;^;&quot;,&quot;~u62d79f55-ca92-4546-ad88-b0a7d8475994&quot;,536870924]],[&quot;^16&quot;,[91,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;炸薯条&lt;/p&gt;\\n下薯條油只能装锅子一半高，當下溫度不要太高，薯條水分高，一下薯條油會往上噴满出来，薯條要炸到表皮酥起鍋吸油，可以用義式香料，鹽，黑胡椒調味\\nps自己做薯條可以用马铃薯切条，沾蛋液加低筋麵粉自制\\n![image.png](../assets/image_1656396486232_0.png)&quot;,536870924]],[&quot;^16&quot;,[91,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[91,&quot;^F&quot;,95,536870924]],[&quot;^16&quot;,[91,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[91,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[91,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[91,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[91,&quot;^;&quot;,&quot;~u62d79f55-1d52-40b7-8503-904a44f9bf4b&quot;,536870924]],[&quot;^16&quot;,[92,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作義大利麵醬&lt;/p&gt;\\n使用鋼鍋冷锅冷油下洋蔥炒香，加一到兩片月桂葉（增加香氣），可以加一點剛剛泡蒜頭的油，等洋蔥變透明炒乾才下一湯匙蒜頭，不然濕濕的下蒜頭，蒜頭會吵不香，接著下紅蘿蔔稍微炒一下，接著加奧立綱origano香料，加3大茶匙白酒，等白酒揮發一下，加一大茶匙的番茄糊，加雞高湯500cc進去給他熬，會熬很久中間可以加點鹽&quot;,536870924]],[&quot;^16&quot;,[92,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[92,&quot;^F&quot;,86,536870924]],[&quot;^16&quot;,[92,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[92,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[92,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[92,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[92,&quot;^;&quot;,&quot;~u62d79f55-c5f0-4196-89f5-48628ed229bb&quot;,536870924]],[&quot;^16&quot;,[93,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;额外知识点&lt;/p&gt;\\n只有蛋白質會沾鍋，有些蔬菜可以不用非加油不可\\n西餐爐前面兩口拿來炒，後面兩口燉煮用&quot;,536870924]],[&quot;^16&quot;,[93,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[93,&quot;^F&quot;,82,536870924]],[&quot;^16&quot;,[93,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[93,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[93,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[93,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[93,&quot;^;&quot;,&quot;~u62d79f55-dbb0-4491-a2cd-46ae87cde8da&quot;,536870924]],[&quot;^16&quot;,[94,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;食材处理&lt;/p&gt;\\n洋葱完整時不要先洗，可以用刀尖剃开皮，只要撕薄薄的皮，然後头尾部份还会有些皮的颜色的组织清乾净就好，不用撕掉太多中间可以吃的部份\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;洋蔥碎&lt;/p&gt;對半切後蒂頭留着不要切掉，使用刀尖或刀尾，顺纹切細條狀，留蒂头处三分之一不斷，接著橫向切三刀，最後再逆纹切，就可以切出洋蔥碎，靠近蒂头处可以从两侧圆弧形削完，最後在沾板上把它再剁碎\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;洋蔥丁&lt;/p&gt;把蒂頭去掉，橫向逆纹切一公分寬平行，接著按照顺纹弧度切成丁，最後面剩兩三刀時可以把它倒下來切比較順手\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;杏鮑菇&lt;/p&gt;（基本太空包所有香菇）不建議洗，洗了以後吸水用炒的就不會香，只能用紙巾擦，但如果有沙有土类型的香菇就要洗\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;杏鮑菇絲&lt;/p&gt;先把它切片，然後再放成絲\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;巴西蘑菇角&lt;/p&gt;十字對切就是角，柱狀可以吃，但中式香菇的柱狀物就建議拿掉太硬了影响口感，香菇柱子可以煮汤\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;蘑菇片&lt;/p&gt;直接暴力切片，可以稍微厚一點，約3mm，口感較好不要太薄\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;玉米筍&lt;/p&gt;玉米鬚在燒烤时是最好吃的精华，帶皮烤完撥開撒點鹽直接吃很棒\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;青花菜&lt;/p&gt;一整顆的時候可以把尾端用削皮刀削一下根部\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;蒜頭&lt;/p&gt;儘量不要碰到水，可以用小刀切蒂頭順便拉一點絲起來比較好撥，切完後再過一下水去掉上面的糖，可以做起來以後泡（好的苦的初榨義大利橄欖油）防止氧化，放冷藏可使用一个月\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;火腿片&lt;/p&gt;切长宽1公分的正方片\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;培根片&lt;/p&gt;用薄片的是橫著刀片下來，新手要小心，主要食指中指放在食材上，无名小指一定都高於水平面才部会切到，另外拿刀的拇指压刀\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;九層塔&lt;/p&gt;稍微直线切几刀就好\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;小黃瓜&lt;/p&gt;可以用削皮刀削薄片，要放冰水才會脆\\n![image.png](../assets/image_1656396472792_0.png)&quot;,536870924]],[&quot;^16&quot;,[94,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[94,&quot;^F&quot;,89,536870924]],[&quot;^16&quot;,[94,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[94,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[94,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[94,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[94,&quot;^;&quot;,&quot;~u62d79f55-b4fa-48c1-a55d-c2b0e9655fbf&quot;,536870924]],[&quot;^16&quot;,[95,&quot;^R&quot;,&quot;&quot;,536870924]],[&quot;^16&quot;,[95,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[95,&quot;^F&quot;,97,536870924]],[&quot;^16&quot;,[95,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[95,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[95,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[95,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[95,&quot;^;&quot;,&quot;~u62d79f55-ece4-4915-a124-ee8c55d7bdae&quot;,536870924]],[&quot;^16&quot;,[96,&quot;^R&quot;,&quot;&quot;,536870924]],[&quot;^16&quot;,[96,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[96,&quot;^F&quot;,94,536870924]],[&quot;^16&quot;,[96,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[96,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[96,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[96,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[96,&quot;^;&quot;,&quot;~u62d79f55-ec73-4f39-8453-f36080bafbc0&quot;,536870924]],[&quot;^16&quot;,[97,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作恩立蛋炒蛋&lt;/p&gt;\\n為了讓鍋不沾需要养锅，或者说煮之前用油润锅（這種鑄鐵鍋如果溫度掉太快會沾鍋），上面那口六寸生鐵鍋燒熱，會冒煙關火後下兩湯匙油，開火燒到有煙為止，冒煙後把油倒出來再重複倒油進去到冒煙，润锅两次完成\\n1.　留一點油，离火下兩塊奶油，鍋很熱所以要小心奶油噴，火關小火把一人份歐姆蛋放進鍋子，用木鏟輕輕前後左右推動，儘量不要推太用力到底部避免沾鍋，直到半凝固狀時就不要繼續攪拌儘量讓底部成形，離火下料鋪平，加起司絲，微微向自己翹起把一半包起來，確定底部脫離把它完整包好即完成\\n2.　另一種版本，鍋燒熱用大火，直接大火離火下奶油狂噴，奶油化開直接下蛋液，大火攪拌，一樣離火確認半凝固下料下起司絲，蓋下來往前推，左右包進來，開小火再煎定型兩個小角&quot;,536870924]],[&quot;^16&quot;,[97,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[97,&quot;^F&quot;,84,536870924]],[&quot;^16&quot;,[97,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[97,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[97,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[97,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[97,&quot;^;&quot;,&quot;~u62d79f55-5855-4f99-a3ae-2fb4f1cebe6e&quot;,536870924]],[&quot;^16&quot;,[98,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作義大利麵条&lt;/p&gt;\\n義大利麵條，煮滾加鹽轉開下麵，計時七分鐘（通常標準就是包裝袋少一分鐘）\\n同時可以乾炒杏鮑菇跟蘑菇，下蒜油炒香，下一大踢蒜頭，加入剛剛炒好的洋蔥培根，炒香後加入剛剛燉的番茄醬汁，混合均勻後試味道（老師這裡補了鹽）開小火等麵時間到，時間到麵條放入醬汁，拌勻，（太乾可以加水或無調味高湯），下九層塔，最後再下一點蒜油\\n裝盤可以用湯杓輔助，上起司粉，巴西莉，培根乾，漂亮的整片九層塔，燙過的青花菜&quot;,536870924]],[&quot;^16&quot;,[98,&quot;^P&quot;,&quot;^17&quot;,536870924]],[&quot;^16&quot;,[98,&quot;^F&quot;,85,536870924]],[&quot;^16&quot;,[98,&quot;^Y&quot;,78,536870924]],[&quot;^16&quot;,[98,&quot;^V&quot;,78,536870924]],[&quot;^16&quot;,[98,&quot;^U&quot;,78,536870924]],[&quot;^16&quot;,[98,&quot;^18&quot;,true,536870924]],[&quot;^16&quot;,[98,&quot;^;&quot;,&quot;~u62d79f55-1b15-4e4e-be96-85ffc2908879&quot;,536870924]],[&quot;^16&quot;,[101,&quot;^L&quot;,1655450773088,536871021]],[&quot;^16&quot;,[101,&quot;^O&quot;,20220617,536870928]],[&quot;^16&quot;,[101,&quot;^@&quot;,true,536870928]],[&quot;^16&quot;,[101,&quot;^Z&quot;,&quot;jun 17th, 2022&quot;,536870928]],[&quot;^16&quot;,[101,&quot;^12&quot;,&quot;Jun 17th, 2022&quot;,536870928]],[&quot;^16&quot;,[101,&quot;^B&quot;,1656394696602,536871021]],[&quot;^16&quot;,[101,&quot;^;&quot;,&quot;~u62d79f55-9766-428f-a012-9b7252a9eceb&quot;,536870928]],[&quot;^16&quot;,[102,&quot;^L&quot;,1655450953682,536871021]],[&quot;^16&quot;,[102,&quot;^@&quot;,false,536870928]],[&quot;^16&quot;,[102,&quot;^Z&quot;,&quot;83_travel_diving&quot;,536870928]],[&quot;^16&quot; .com.tw/maps/place/Hua+Hin+Pier/@7.6863396,99.0982013,15.95z/data=!4m5!3m4!1s0x3051fdfe7a43053d:0xac0ad3665222e27!8m2!3d7.6935801!4d99.0989062\\n**Koh Lanta 马蜂窝**\\nhttps://www.mafengwo.cn/wenda/detail-16238153.html\\nhttp://www.mafengwo.cn/i/8060589.html\\n**Krabi北边景点**\\nao Luk Pee Hua Toe Cave\\n住宿Lan Village Homestay Krabi\\n**Koh Lanta Diving**\\nThe best and most world famous dive sites are Hin Daeng and Hin Muang. They are both listed among the best dive spots in Thailand and in the world. Hin Daeng is famous for its fantastic marine life on a steep wall and Hin Muang for the superb violet coral.\\n1） 甲米 雨季封岛时间：5月15 - 10月15日\\n2）封的海岛有：Rok岛、Haa岛、红石紫石、翡翠洞等。\\n3）小 皮皮岛 的玛雅湾最近1、2年永久封闭，什么时候开放未知。\\n4） 翡翠池 的蓝池雨季也是封的！不是整个 翡翠池 都封，是翡翠城池里的蓝池会封。\\n\\n兰塔岛的潜点主要是三个方向：\\n1）往北到皮皮岛以南，koh bida潜点群，船程2小时\\n2）往西koh haa潜点群，船程1.5-2小时\\n3）南部红石紫石（hin daeng, hin muang），大船3小时，快船1.5小时，也是兰塔岛的精华潜点，珊瑚生长非常好，大东西出没概率高，鲸鲨，manta，eagle ray非常多。\\n在最高峰季节的12-1月，兰塔岛有的潜店会推出船宿，其他大部分时间主要是day trip，去往不同的方向的潜点，做2-3潜。\\n\\n![image.png](../assets/image_1657611172340_0.png)\\n![image.png](../assets/image_1657611196484_0.png)&quot;,536870942]],[&quot;^16&quot;,[172,&quot;^P&quot;,&quot;^17&quot;,536870942]],[&quot;^16&quot;,[172,&quot;^F&quot;,176,536870942]],[&quot;^16&quot;,[172,&quot;^Y&quot;,162,536870942]],[&quot;^16&quot;,[172,&quot;^V&quot;,162,536870942]],[&quot;^16&quot;,[172,&quot;^U&quot;,134,536870942]],[&quot;^16&quot;,[172,&quot;^U&quot;,162,536870942]],[&quot;^16&quot;,[172,&quot;^H&quot;,134,536870942]],[&quot;^16&quot;,[172,&quot;^18&quot;,true,536870942]],[&quot;^16&quot;,[172,&quot;^;&quot;,&quot;~u62d79f55-159c-452c-b1a9-0e3d2b4a768f&quot;,536870942]],[&quot;^16&quot;,[173,&quot;^R&quot;,&quot;&quot;,536870942]],[&quot;^16&quot;,[173,&quot;^P&quot;,&quot;^17&quot;,536870942]],[&quot;^16&quot;,[173,&quot;^F&quot;,162,536870942]],[&quot;^16&quot;,[173,&quot;^Y&quot;,162,536870942]],[&quot;^16&quot;,[173,&quot;^V&quot;,162,536870942]],[&quot;^16&quot;,[173,&quot;^U&quot;,162,536870942]],[&quot; 切片\\n檸檬半顆直接擠汁\\n![image.png](../assets/image_1657524092868_0.png)\\n![image.png](../assets/image_1657524115701_0.png)&quot;,536870944]],[&quot;^16&quot;,[184,&quot;^P&quot;,&quot;^17&quot;,536870944]],[&quot;^16&quot;,[184,&quot;^F&quot;,183,536870944]],[&quot;^16&quot;,[184,&quot;^Y&quot;,181,536870944]],[&quot;^16&quot;,[184,&quot;^V&quot;,181,536870944]],[&quot;^16&quot;,[184,&quot;^U&quot;,181,536870944]],[&quot;^16&quot;,[184,&quot;^18&quot;,true,536870944]],[&quot;^16&quot;,[184,&quot;^;&quot;,&quot;~u62d79f56-2792-4c59-bb0c-e0f098db778d&quot;,536870944]],[&quot;^16&quot;,[185,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作美乃滋&lt;/p&gt;\\n美乃滋 一顆蛋黃，1/2大茶匙糖先打再加，一瓶蓋白酒醋，1/4小茶匙黃芥末，一點點鹽放在鋼盆裡面打打打（蛋黃裡面有卵凝酯），打到有點變白，很多空氣的感覺，慢慢分批次倒入油100cc，如果油水分離就是失敗的美乃滋，自製的保存頂多一週較佳，在家裏可以用優格代替\\n打好的美乃滋，加入芥末1小茶匙，一點點，1g左右茴香（蒔蘿草），一大茶匙蜂蜜，一點檸檬汁（酸會讓食材變白）\\n失敗的美乃滋，就是油水分離，通常是沒打發或者是油加太快，這樣会是一直水水像油醋的液體怎麽打都打不起来，失敗補救方法再弄一顆蛋黃跟一瓶蓋的醋，把蛋黃汁打白，這時候把上面的失敗品慢慢加進去就可以重新打發\\n\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作恩立蛋&lt;/p&gt;\\n馬鈴薯用冷水煮，這次的丁大小約莫水滾5分鐘\\n六顆蛋加1/2小茶匙的鹽，鮮奶油3大茶匙搅拌均匀後用三角濾網過濾\\n炒料，小鐵鍋燒熱，養鍋，洋蔥炒透，下火腿，炒香下番茄黑橄欖，不要炒太久番茄會散，下1/4小茶匙的鹽，起鍋後把水煮馬鈴薯加進來拌匀，料就準備好了\\n开始煎蛋，養鍋很重要，沒養好很容易煎失敗，養好離火下奶油會狂噴，奶油融了下蛋液，快速拌炒，可配合抖动锅柄(不要用力刮鍋子底部) 確認底部不沾鍋，把料向下壓進半熟蛋裡面，边缘让它多累积一点蛋液体，連同鍋子烤箱烤170度6分鐘，剩一分鐘的時候上面可以下蔥花調高成180度讓表面上色，出烤箱下一點巴西莉，一點起司粉，一點點匈牙利紅椒粉\\n![image.png](../assets/image_1657524408934_0.png)&quot;,536870944]],[&quot;^16&quot;,[185,&quot;^P&quot;,&quot;^17&quot;,536870944]],[&quot;^16&quot;,[185,&quot;^F&quot;,184,536870944]],[&quot;^16&quot;,[185,&quot;^Y&quot;,181,536870944]],[&quot;^16&quot;,[185,&quot;^V&quot;,181,536870944]],[&quot;^16&quot;,[185,&quot;^U&quot;,181,536870944]],[&quot;^16&quot;,[185,&quot;^18&quot;,true,536870944]],[&quot;^16&quot;,[185,&quot;^;&quot;,&quot;~u62d79f56-8762-41dd-8538-63359347a75d&quot;,536870944]],[&quot;^16&quot;,[186,&quot;^R&quot;,&quot;&quot;,536870944]],[&quot;^16&quot;,[186,&quot;^P&quot;,&quot;^17&quot;,536870944]],[&quot;^16&quot;,[186,&quot;^F&quot;,185,536870944]],[&quot;^16&quot;,[186,&quot;^Y&quot;,181,536870944]],[&quot;^16&quot;,[186,&quot;^V&quot;,181,536870944]],[&quot;^16&quot;,[186,&quot;^U&quot;,181,536870944]],[&quot;^16&quot;,[186,&quot;^18&quot;,true,536870944]],[&quot;^16&quot;,[186,&quot;^;&quot;,&quot;~u62d79f56-af5f-4d35-b3fe-7a280345635d&quot;,536870944]],[&quot;^16&quot;,[187,&quot;^R&quot;,&quot;果醬，四大茶匙的糖冷鍋炒出焦糖，褐色起泡，下冷凍覆盆子一公斤煮，煮滾，用果汁機打細，有時間就一路熬煮到水分散失，沒空的話老師用速成的方式，熟粉玉米粉去勾芡（水3:1粉），如果不是為了當沾醬畫筆，可以加麥芽糖去勾芡\\n\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作三明治&lt;/p&gt;\\n培根小火煎香酥起鍋，吐司两面烤香，組裝，吐司為底，加上美乃滋，加上生菜加上番茄，上培根，頂蓋吐司上去，吐司去邊，切成四個三角形擺盤(通常做三明治生菜放下面，肉會放上面，咬下去的口感會比較好)\\n![image.png](../assets/image_1657524499210_0.png)&quot;,536870944]],[&quot;^16&quot;,[187,&quot;^P&quot;,&quot;^17&quot;,536870944]],[&quot;^16&quot;,[187,&quot;^F&quot;,186,536870944]],[&quot;^16&quot;,[187,&quot;^Y&quot;,181,536870944]],[&quot;^16&quot;,[187,&quot;^V&quot;,181,536870944]],[&quot;^16&quot;,[187,&quot;^U&quot;,181,536870944]],[&quot;^16&quot;,[187,&quot;^18&quot;,true,536870944]],[&quot;^16&quot;,[187,&quot;^;&quot;,&quot;~u62d79f56-cb2c-4976-bf50-f046d698542c&quot;,536870944]],[&quot;^16&quot;,[188,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作鬆餅&lt;/p&gt;\\n\\n松饼面糊，兩顆蛋分离成蛋白蛋黃，将糖加入蛋白打發，牛奶，蜂蜜加入蛋黃中，麵粉泡打粉過篩加進去(如果不想加泡打粉也可以把蛋白打發也有一定效果)，把蛋白打到濕性發泡即可，分兩三次加入蛋黃中，用木勺拌勻\\n![image.png](../assets/image_1657524572440_0.png){:height 732, :width 618}\\n大的平底鍋燒熱養鍋，油下去產生油紋代表夠熱，(這邊重點要把多餘的油擦乾淨，開始小火煎鬆餅，才不會底不好看)，将面糊一湯匙由上往下滴下去，煎一段时间後表面氣泡會開始破，觀察底面煎上色後翻面，會開始膨脹，确认煎熟後起锅，在煎下一批次的面糊前要拿剛剛吸油的紙巾潤過整个铁锅，煎下一批平面才会漂亮\\n擺盤，放上松饼香蕉奇異果，抹上沾醬，松饼塔上面放上一块奶油抹糖霜\\n\\n\\n\\n&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;奇異果切法&lt;/p&gt;\\n削奇異果的方式先在蒂頭用刀尾畫一圈開頭，把一個尖尖的地方切掉(影响口感刺舌)，然後用刀末段削皮（儘量不要用削皮刀），正中用小刀下刀正中切下去，然後前後兩刀斜切可以做成造型切\\n![image.png](../assets/image_1657524865783_0.png)&quot;,536870944]],[&quot;^16&quot;,[188,&quot;^P&quot;,&quot;^17&quot;,536870944]],[&quot;^16&quot;,[188,&quot;^F&quot;,187,536870944]],[&quot;^16&quot;,[188,&quot;^Y&quot;,181,536870944]],[&quot;^16&quot;,[188,&quot;^V&quot;,181,536870944]],[&quot;^16&quot;,[188,&quot;^U&quot;,181,536870944]],[&quot;^16&quot;,[188,&quot;^18&quot;,true,536870944]],[&quot;^16&quot;,[188,&quot;^;&quot;,&quot;~u62d79f56-a672-4815-af60-9723430daf36&quot;,536870944]],[&quot;^16&quot;,[190,&quot;^L&quot;,1658298198161,536870946]],[&quot;^16&quot;,[190,&quot;^O&quot;,20220709,536870946]],[&quot;^16&quot;,[190,&quot;^@&quot;,true,536870946]],[&quot;^16&quot;,[190,&quot;^Z&quot;,&quot;jul 9th, 2022&quot;,536870946]],[&quot;^16&quot;,[190,&quot;^12&quot;,&quot;Jul 9th, 2022&quot;,536870946]],[&quot;^16&quot;,[190,&quot;^B&quot;,1658298198161,536870946]],[&quot;^16&quot;,[190,&quot;^;&quot;,&quot;~u62d79f56-3856-4bc8-8228-49d32a1621b8&quot;,536870946]],[&quot;^16&quot;,[191,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作蘋果餡&lt;/p&gt;\\n炒蘋果餡，蘋果四顆切成丁，葡萄乾，肉桂粉，萊姆酒，砂糖5大茶匙，奶油30g\\n5大茶匙的糖先炒出焦糖香，但千萬不要煮焦，炒到淡淡紅茶的顏色後下奶油，（如果這時候下鮮奶油就是森永牛奶糖），奶油融化後下蘋果、葡萄乾，要拌勻不然糖會沉在下面，下肉桂粉1/2小茶匙，開始讓他燉一下，过程中葡萄乾一定要浸在裡面，不然會硬硬的，一路拌炒大概20分鐘，收到有點幾乎乾，下一大茶匙的萊姆酒，收酒揮發後加檸檬汁一瓣，再加鹽&quot;,536870946]],[&quot;^16&quot;,[191,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[191,&quot;^F&quot;,198,536870946]],[&quot;^16&quot;,[191,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[191,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[191,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[191,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[191,&quot;^;&quot;,&quot;~u62d79f56-fee3-4bf4-838b-4da3312bfbda&quot;,536870946]],[&quot;^16&quot;,[192,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[192,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[192,&quot;^F&quot;,211,536870946]],[&quot;^16&quot;,[192,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[192,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[192,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[192,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[192,&quot;^;&quot;,&quot;~u62d79f56-33ca-4611-a154-4166d09253d4&quot;,536870946]],[&quot;^16&quot;,[193,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[193,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[193,&quot;^F&quot;,214,536870946]],[&quot;^16&quot;,[193,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[193,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[193,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[193,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[193,&quot;^;&quot;,&quot;~u62d79f56-6844-449a-bf20-ad3bf6de68b2&quot;,536870946]],[&quot;^16&quot;,[194,&quot;^R&quot;,&quot;![image.png](../assets/image_1657521975199_0.png)\\n![image.png](../assets/image_1657522368820_0.png)&quot;,536870946]],[&quot;^16&quot;,[194,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[194,&quot;^F&quot;,196,536870946]],[&quot;^16&quot;,[194,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[194,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[194,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[194,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[194,&quot;^;&quot;,&quot;~u62d79f56-5e3c-44fb-b121-325d9595235c&quot;,536870946]],[&quot;^16&quot;,[195,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作蛤蜊蕃茄湯&lt;/p&gt;\\n把一半的海鲜高湯拿来做蛤蜊湯，加入番茄後煮滾，下蛤蜊盖蓋子關火燜，五分鐘通常蛤蜊會開，如果沒開就再開火一下，边开边捞出去殼，蛤蜊拿出来备用，高湯加入上面炒好的汤料中，再煮20分鐘左右，紅蘿蔔馬鈴薯都熟，用叉子会透就關火&quot;,536870946]],[&quot;^16&quot;,[195,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[195,&quot;^F&quot;,199,536870946]],[&quot;^16&quot;,[195,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[195,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[195,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[195,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[195,&quot;^;&quot;,&quot;~u62d79f56-a7ed-4a98-8e17-78cafbf142c8&quot;,536870946]],[&quot;^16&quot;,[196,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;高汤煮鱼&lt;/p&gt;\\n300cc雞高湯混300cc魚高湯，帶皮的魚撈起吸水，魚皮朝下，魚片放到大概八十度的雞魚高湯中，大概六分鐘就熟了，撈起濾水擺盤在馬鈴薯條上&quot;,536870946]],[&quot;^16&quot;,[196,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[196,&quot;^F&quot;,216,536870946]],[&quot;^16&quot;,[196,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[196,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[196,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[196,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[196,&quot;^;&quot;,&quot;~u62d79f56-4b48-46a2-8e67-c8ea1654689d&quot;,536870946]],[&quot;^16&quot;,[197,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[197,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[197,&quot;^F&quot;,202,536870946]],[&quot;^16&quot;,[197,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[197,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[197,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[197,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[197,&quot;^;&quot;,&quot;~u62d79f56-86a9-44f4-ae64-53a413920bb3&quot;,536870946]],[&quot;^16&quot;,[198,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[198,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[198,&quot;^F&quot;,206,536870946]],[&quot;^16&quot;,[198,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[198,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[198,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[198,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[198,&quot;^;&quot;,&quot;~u62d79f56-9214-49fa-b713-3695263e329c&quot;,536870946]],[&quot;^16&quot;,[199,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[199,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[199,&quot;^F&quot;,212,536870946]],[&quot;^16&quot;,[199,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[199,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[199,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[199,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[199,&quot;^;&quot;,&quot;~u62d79f56-6fcb-44a4-8858-203c9559447d&quot;,536870946]],[&quot;^16&quot;,[200,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作塔皮与组装&lt;/p&gt;\\n做塔皮，模具內側用纸巾抹奶油，接着倒中筋麵粉進去讓內側沾均勻防沾黏\\n麵粉過篩，糖分也過篩，拌均勻，1/8小茶匙的鹽，奶油下，拌的時候不要去揉（容易出筋），不要捏到他油亮出油(會有油耗味收縮率太高等问题)，下半顆的蛋液大概30g搅拌均匀，分成各個大概30g的麵團，圓圓斜斜的下模具去按，底部最厚，不要透，把邊邊修掉修匀，可以再把塔皮捏得高出杯壁一點點，收縮完後會完美低於杯壁一點點，底部插洞排氣\\n塔皮先考170度12分鐘，出來會呈现金黃色，蘋果餡濾液体後放上塔皮\\n剩下的塔皮可以加奶粉2/3大茶匙，糖分2/3大茶匙，用雙手前後搓揉的方式拌勻，撒在塔的上方，回烤5分鐘&quot;,536870946]],[&quot;^16&quot;,[200,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[200,&quot;^F&quot;,191,536870946]],[&quot;^16&quot;,[200,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[200,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[200,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[200,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[200,&quot;^;&quot;,&quot;~u62d79f56-7927-412d-aff7-cde1ff107cc7&quot;,536870946]],[&quot;^16&quot;,[201,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[201,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[201,&quot;^F&quot;,197,536870946]],[&quot;^16&quot;,[201,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[201,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[201,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[201,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[201,&quot;^;&quot;,&quot;~u62d79f56-09fa-47db-8109-551e5644e0cd&quot;,536870946]],[&quot;^16&quot;,[202,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;額外知識&lt;/p&gt;\\n番茄糊可以買大罐分裝冷凍，不太會結凍因為水分不多\\n蛤蜊保存，吐沙的時候不要淹過蛤蜊，也不要讓他們壓在一起，放鹽水可以冷藏幾天，鹽水大概海水鹹度25-26趴\\n蘋果不要放鹽水裡，要放可以放檸檬水，如果要搞剛可以放在蜂蜜檸檬水裡面\\n巡，日本人設計的西餐刀，老師的刀\\n通霄海水鹽場可以付費150元去參觀，原來台鹽ph9.5的礦泉水是煮過的礦泉水\\n老师会去三峽鱸魚鱘龍魚鱒魚養殖場，一斤三百，溪水養的，可真空宅配&quot;,536870946]],[&quot;^16&quot;,[202,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[202,&quot;^F&quot;,213,536870946]],[&quot;^16&quot;,[202,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[202,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[202,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[202,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[202,&quot;^;&quot;,&quot;~u62d79f56-5b04-4ceb-a212-9d79745a7d6d&quot;,536870946]],[&quot;^16&quot;,[203,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;魚的蘑菇醬&lt;/p&gt;\\n洋蔥碎，四大茶匙的量\\n蘑菇切片\\n紅蔥頭碎2大茶匙的量\\n蘑菇醬，先炒菇，油稍微多一些，菇炒到乾香，洋蔥紅蔥頭下，下50g奶油，240cc剛剛魚湯的高湯（過程要記得撇浮沫），預計要煮到剩下120cc的時候再加120cc的動物小鮮奶油，再繼續煮的剩120cc時就差不多了，過程中都不加鹽，以免控制不好越煮越鹹，（煮白醬要注意旁邊儘量不要讓他焦，注意火候），用湯匙判斷稠度，要他三角形聚集到尖端往下滴差不多，開始調味鹽巴，少許白胡椒，（海鮮要鹹才會鮮，不然會腥），最後乳化加20g奶油，下一點巴西莉，豪华版酱汁這時候可以加鮭魚卵，魚子醬等等&quot;,536870946]],[&quot;^16&quot;,[203,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[203,&quot;^F&quot;,193,536870946]],[&quot;^16&quot;,[203,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[203,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[203,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[203,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[203,&quot;^;&quot;,&quot;~u62d79f56-d016-47f4-9768-06406a47aea3&quot;,536870946]],[&quot;^16&quot;,[204,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[204,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[204,&quot;^F&quot;,203,536870946]],[&quot;^16&quot;,[204,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[204,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[204,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[204,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[204,&quot;^;&quot;,&quot;~u62d79f56-5a7c-442f-86fd-6ab1b832cc22&quot;,536870946]],[&quot;^16&quot;,[205,&quot;^R&quot;,&quot;起鍋前装盤准备，調味，加梅林醬油一小茶匙（要事先把梅林酱搖均勻），tabasco酱汁甩兩下少少的，汤滾了下蔥綠殺青，蛤蜊肉下，裝盤後滴一兩滴檸檬汁&quot;,536870946]],[&quot;^16&quot;,[205,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[205,&quot;^F&quot;,195,536870946]],[&quot;^16&quot;,[205,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[205,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[205,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[205,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[205,&quot;^;&quot;,&quot;~u62d79f56-6c7c-4548-8636-6342fde05b3e&quot;,536870946]],[&quot;^16&quot;,[206,&quot;^R&quot;,&quot;![image.png](../assets/image_1657521221810_0.png)&q ;,[207,&quot;^;&quot;,&quot;~u62d79f56-ddc5-4bea-92ac-754a607edb4e&quot;,536870946]],[&quot;^16&quot;,[208,&quot;^R&quot;,&quot;[[632_Cook_Recipe]] &lt;p style=\\&quot;color:grey\\&quot;&gt;第七堂課20220709肉桂奶酥苹果塔，奶油蘑菇鲈鱼排，曼哈顿蛤蛎蕃茄汤&lt;/p&gt;&quot;,536870946]],[&quot;^16&quot;,[208,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[208,&quot;^F&quot;,190,536870946]],[&quot;^16&quot;,[208,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[208,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[208,&quot;^U&quot;,24,536870946]],[&quot;^16&quot;,[208,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[208,&quot;^H&quot;,24,536870946]],[&quot;^16&quot;,[208,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[208,&quot;^;&quot;,&quot;~u62d79f56-0b33-4047-83e5-2e344ae97500&quot;,536870946]],[&quot;^16&quot;,[209,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;鱼菲力处理&lt;/p&gt;\\n殺魚用去鱗器，上下魚鰭很尖銳，先尾巴往頭逆鱗去鱗，通常在水裡殺鱗片就不會亂噴，魚鰓拿剪刀夾住轉一轉扯斷先不拿出，從尾端排泄孔下剪刀正中剖開，往前內臟可以一路拉出一整付內臟包含魚鰓，最後拿出尾端魚膘，靠背部脊椎的部分有一些膜跟血塊黏液要洗乾淨\\n魚菲力(菲力是指刀工而非部位，沒有骨頭、刺等)，鱸魚脂肪少膠質多，兩面側腹兩個侧鳍腹鳍拉起來斜切各一刀，就可以把鱼头三角形切下来，可分割为魚下巴跟鱼头，接着魚的尾巴先切平刀一刀到脊椎骨骨頭不要切斷魚頭朝兩點方向，魚背朝向自己，從脊椎骨的上緣下一刀，再切斷肋骨把第一片片下來，不要直接切斷(方便片另外一面的时候有着力点)，換成尾巴兩點鐘方向，片另外一面，片下来後也把原本没切断的第一面取下来，接着将两面片下来的鱼肉去骨修形，魚腹找肋骨，一刀刀同方向下，不要來回拉刀鱼肉会碎，可以剔除骨頭肉，背鰭的小刺小骨頭修掉，鲷鱼魚刺主要在前三分之一段，如要去皮(去皮的用煮的)，先在尾端肉的那面靠边边0.5公分处开一个口，用手拉着尾端，鱼皮朝下下刀，左右左右就可以把整片皮片起來，頭尾修一下就得到完整的魚菲力，若不去皮的魚排(拿来用煎的)，前後修一下，切成兩塊，把兩邊擠一下弓起來，間隔一公分畫皮即准备完成\\n两种去皮与不去皮的鱼片腌制，魚片用鹽白胡椒跟60cc白酒腌渍，包保鮮膜放冰箱(这次约放一小时午餐时间)\\n![image.png](../assets/image_1657519287893_0.png)\\n![image.png](../assets/image_1657519323597_0.png)&quot;,536870946]],[&quot;^16&quot;,[209,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[209,&quot;^F&quot;,192,536870946]],[&quot;^16&quot;,[209,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[209,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[209,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[209,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[209,&quot;^;&quot;,&quot;~u62d79f56-a863-40a3-9e38-877a8a23d4f3&quot;,536870946]],[&quot;^16&quot;,[210,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[210,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[210,&quot;^F&quot;,201,536870946]],[&quot;^16&quot;,[210,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[210,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[210,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[210,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[210,&quot;^;&quot;,&quot;~u62d79f56-5b58-4b02-a0ac-6f2b376366fe&quot;,536870946]],[&quot;^16&quot;,[211,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;海鮮高湯&lt;/p&gt;\\n蔬菜餘料，魚骨頭，白胡椒粒（顆粒）一小茶匙，白酒60cc，一片月桂葉，水大概2000～2500cc，煮滾後大概15分鐘关火(海鲜高汤不要煮久)&quot;,536870946]],[&quot;^16&quot;,[211,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[211,&quot;^F&quot;,204,536870946]],[&quot;^16&quot;,[211,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[211,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[211,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[211,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[211,&quot;^;&quot;,&quot;~u62d79f56-c0ef-4bf0-bb8a-f7281ecf15f1&quot;,536870946]],[&quot;^16&quot;,[212,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;炒湯料&lt;/p&gt;\\n炒湯料，冷鍋冷油，小火，先炒紅蘿蔔炒透，紅蘿蔔有點熱有點起泡時下培根，培根炒到微透明下洋蔥蒜白，蔬菜不要炒黃，下西芹蒜碎，蒜頭很碎所以不要炒久容易焦，下番茄，一片月桂葉，下兩大茶匙白酒，白酒揮發下馬鈴薯&quot;,536870946]],[&quot;^16&quot;,[212,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[212,&quot;^F&quot;,209,536870946]],[&quot;^16&quot;,[212,&quot;^Y&quot;,190,536870946]],[&quot;^16&quot;,[212,&quot;^V&quot;,190,536870946]],[&quot;^16&quot;,[212,&quot;^U&quot;,190,536870946]],[&quot;^16&quot;,[212,&quot;^18&quot;,true,536870946]],[&quot;^16&quot;,[212,&quot;^;&quot;,&quot;~u62d79f56-2749-4972-955a-c5f4d26b2081&quot;,536870946]],[&quot;^16&quot;,[213,&quot;^R&quot;,&quot;&quot;,536870946]],[&quot;^16&quot;,[213,&quot;^P&quot;,&quot;^17&quot;,536870946]],[&quot;^16&quot;,[213,&quot;^F&quot;,194,536870946]],[&quot;^1 t;,[231,&quot;^O&quot;,20220703,536870950]],[&quot;^16&quot;,[231,&quot;^@&quot;,true,536870950]],[&quot;^16&quot;,[231,&quot;^Z&quot;,&quot;jul 3rd, 2022&quot;,536870950]],[&quot;^16&quot;,[231,&quot;^12&quot;,&quot;Jul 3rd, 2022&quot;,536870950]],[&quot;^16&quot;,[231,&quot;^B&quot;,1657268417383,536871021]],[&quot;^16&quot;,[231,&quot;^;&quot;,&quot;~u62d79f56-5b54-43a7-bd73-35f86bbd0780&quot;,536870950]],[&quot;^16&quot;,[232,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;披薩製作&lt;/p&gt;\\n牛番茄切薄片做topping\\n小番茄對開風乾用來裝飾，加鹽，加糖稍微多一點，一點點奧立綱香料，一點點橄欖油，一般可以室温风乾等24小時，不然就进烤箱烤到皱皱的\\n比薩醬，無調味番茄糊，鹽，奧立綱香料果汁機打\\n\\n高筋麵粉鋪桌上，麵團十字桿，180克大概杆成六寸饼皮差不多，上面用湯杓倒一匙比萨蕃茄酱，用屁股抹均勻，下两种起司，放上蕃茄进烤箱，210度烤八分鐘(如果烤的中间有膨胀起来最好用叉子叉破，不然影响美观可能也比较容易焦)，拿出來一開八，然後各片放一片新鲜九層塔共八片，上面再放上風乾番茄，撒一點橄欖油完成。\\n![image.png](../assets/image_1656906046391_0.png)&quot;,536870950]],[&quot;^16&quot;,[232,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[232,&quot;^F&quot;,236,536870950]],[&quot;^16&quot;,[232,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[232,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[232,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[232,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[232,&quot;^;&quot;,&quot;~u62d79f56-3364-4f91-be08-44babfa0a88e&quot;,536870950]],[&quot;^16&quot;,[233,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;炖饭製作&lt;/p&gt;\\n洋蔥半顆切洋葱碎\\n杏鮑菇半根切食指條狀，半根切一開四的1/4圓片\\n製作燉飯可用泰國米或印度米（大概下三次白酒就會熟了，实际没这麽快）简单热油後炒杏鮑菇跟洋蔥，一片月桂葉下，炒到甜味都出現，米進來炒香，下120cc白酒，白酒收乾繼續炒下一杓(150cc)高湯，要持續炒，下第二杓高汤，持續炒，第三杓可以開始注意熟度，老師試到加了第四次才覺得熟度比較適合，但最後又加了一匙高汤，共五杓高湯才覺得適中，開始調味下鹽1/2小茶匙的量，鮮奶油一大茶匙，兩湯匙青醬拌勻，可加高湯調濃度，此時離火起司粉2.5湯匙，三塊奶油用拌的拌開(我青酱加太多所以炖饭摆盘有点出油)\\n鴻禧菇加一點鹽、黑胡椒、沙拉油拌一拌，用熱鍋煎一下，加一點義大利香料，煎到水分出來熟即可放上炖饭装饰\\n![image.png](../assets/image_1656906064879_0.png)&quot;,536870950]],[&quot;^16&quot;,[233,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[233,&quot;^F&quot;,243,536870950]],[&quot;^16&quot;,[233,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[233,&quot;^V -4def-bbc9-15b28cc9c625&quot;,536870950]],[&quot;^16&quot;,[239,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;披薩餅皮製作&lt;/p&gt;\\n酵母加糖搅散，用溫水泡泡大概五分钟表面会有些膨胀的泡泡\\n\\n中筋麵粉加鹽，加上面的酵母水進來，拿叉子攪拌攪散，差不多均匀，用手揉成形，加橄欖油進去（分兩次就好，也不要分太多次或者揉过头）慢慢讓麵團吃進去(不要残留留在锅边即可)，繼續揉大概10分鐘，包保鮮膜讓她發酵一小時，会膨胀成鼓鼓的一团，此时麵團分开成180克一個(大概六寸的饼皮量)，滾圓讓她們上烤盤封保鮮膜二發（麵團會再澎到兩倍大，判断发完没的标准可用戳的不會回彈）&quot;,536870950]],[&quot;^16&quot;,[239,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[239,&quot;^F&quot;,235,536870950]],[&quot;^16&quot;,[239,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[239,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[239,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[239,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[239,&quot;^;&quot;,&quot;~u62d79f56-ad92-4304-a2d9-fd2de778aacc&quot;,536870950]],[&quot;^16&quot;,[240,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;蔬菜湯製作&lt;/p&gt;\\n洋蔥半顆切丁\\n蒜碎\\n紅蘿蔔切成1公分X1公分X0.2公分的丁片樣（修掉角料可以煮基础高湯）\\n西芹削皮切丁片\\n一根杏鮑菇切丁\\n高麗菜梗先丢去煮基础高湯，剩下切一公分切丁\\n培根切丁片\\n鴻禧菇太空包的直接撥\\n馬鈴薯切丁泡水(澱粉類不泡水會變黑)\\n\\n蔬菜湯製作，就是讓他的料煮久一點冷鍋冷油下培根，小火炒香，小火加洋蔥(如果有沾鍋可以用白酒下去炒)，月桂葉，蒜頭，紅蘿蔔西芹下炒香炒透，蒜頭也會黏鍋可以再下一點白酒，炒一炒下高麗菜，義大利香料下一點點提味，下剛剛用餘料跟雞骨準備的基本高湯，下番茄糊150cc(煮湯馬鈴薯不要太早下，會污染湯)\\n燙彎管麵，水加鹽，水滾煮大概七分鐘\\n蔬菜湯出菜，月桂葉夾起來，馬鈴薯煮5-10分鐘只要熟不要爛掉，加鹽調味，淋一圈青醬，裝飾九層塔上&quot;,536870950]],[&quot;^16&quot;,[240,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[240,&quot;^F&quot;,234,536870950]],[&quot;^16&quot;,[240,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[240,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[240,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[240,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[240,&quot;^;&quot;,&quot;~u62d79f56-1e3e-4935-b038-5f8d0862cc85&quot;,536870950]],[&quot;^16&quot;,[241,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;青醬準備&lt;/p&gt;\\n松子120度烤20分鐘，用蒜味花生可代替松子\\n燙九層塔，所以不用先清洗，燙過會比較不香但顏色較漂亮，要裝飾的就不烫先泡水避免乾掉黑掉，水先加鹽，(盐可加速川烫过程，提溫，保持青綠)，重點不能燙太久，燙完以後接續燙巴西莉，兩者燙完冰鎮，把水用力擠乾成一团，全乾不留水分\\n\\n打青酱，今天用vita max 果汁機打，打細的時間較短，九層塔才不容易黑，烤過的松子先下，下蒜頭，下橄 欖油到只要打得動的程度就好，1/4小茶匙鹽，低速先打，然後九層塔慢慢下分次打，打大概五分鐘\\n青醬一次制作起来可以保存冷凍三個月，冷藏一個禮拜&quot;,536870950]],[&quot;^16&quot;,[241,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[241,&quot;^F&quot;,238,536870950]],[&quot;^16&quot;,[241,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[241,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[241,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[241,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[241,&quot;^;&quot;,&quot;~u62d79f56-f524-4749-8f8f-25a3e9029a13&quot;,536870950]],[&quot;^16&quot;,[242,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;起司鸡肉卷製作&lt;/p&gt;\\n雞胸肉修整，去掉y型骨，把雞胸分两片，各片開展成三面，像雞排的樣子，然後輕輕拿刀子剁成平坦的面\\n醃漬雞胸肉，鹽1/4小茶匙，義大利香料一點點，白酒一點點，糖一小茶匙\\n腌制20分钟後，鸡肉卷原形，雞肉鋪底，放上火腿、起司緊緊捲起來，把前後左右多餘的切掉，\\n雞肉過三關（麵粉蛋液麵包粉），各面均匀先铺上高筋麵粉，再進蛋液(打兩顆雞蛋，攪勻過篩)，再上麵包粉\\n![image.png](../assets/image_1656906092088_0.png){:height 461, :width 776}\\n平底鍋下油，稍微多一些油进行煎炸，油會冒很大的煙代表油温够了，離火下雞肉卷，先下收口處才不會開掉讓她先上色定型(油温如果掉了才开火)，持續不用開火煎好六面，接著才開始開小火慢慢煎，（如果太焦就不要繼續煎，用烤箱烤），等中間的雞肉熟了，會從捲的頭尾跑一些白白的蛋白質，此時開大火提高油溫把表面煎酥，擺涼後切片擺盤&quot;,536870950]],[&quot;^16&quot;,[242,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[242,&quot;^F&quot;,244,536870950]],[&quot;^16&quot;,[242,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[242,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[242,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[242,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[242,&quot;^;&quot;,&quot;~u62d79f56-8217-4fef-895f-14993145cc6b&quot;,536870950]],[&quot;^16&quot;,[243,&quot;^R&quot;,&quot;&quot;,536870950]],[&quot;^16&quot;,[243,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[243,&quot;^F&quot;,242,536870950]],[&quot;^16&quot;,[243,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[243,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[243,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[243,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[243,&quot;^;&quot;,&quot;~u62d79f56-2a74-4393-897a-bcb960ecb6bc&quot;,536870950]],[&quot;^16&quot;,[244,&quot;^R&quot;,&quot;&quot;,536870950]],[&quot;^16&quot;,[244,&quot;^P&quot;,&quot;^17&quot;,536870950]],[&quot;^16&quot;,[244,&quot;^F&quot;,240,536870950]],[&quot;^16&quot;,[244,&quot;^Y&quot;,231,536870950]],[&quot;^16&quot;,[244,&quot;^V&quot;,231,536870950]],[&quot;^16&quot;,[244,&quot;^U&quot;,231,536870950]],[&quot;^16&quot;,[244,&quot;^18&quot;,true,536870950]],[&quot;^16&quot;,[244,&quot;^;&quot;,&quot;~u62d79f56-4dc8-4deb-9e96-97c35d2010e4&quot;,536870950]],[&quot;^16&quot;,[246,&quot;^L&quot;,1657075956664,536871021]],[&quot;^16&quot;,[246,&quot;^O&quot;,20220702,536870952]],[&quot;^16&quot;,[246,&quot;^@&quot;,true,536870952]],[&quot;^16&quot;,[246,&quot;^Z&quot;,&quot;jul 2nd, 2022&quot;,536870952]],[&quot;^16&quot;,[246,&quot;^12&quot;,&quot;Jul 2nd, 2022&quot;,536870952]],[&quot;^16&quot;,[246,&quot;^B&quot;,1657268487795,536871021]],[&quot;^16&quot;,[246,&quot;^;&quot;,&quot;~u62d79f56-7480-4943-a995-829acb291246&quot;,536870952]],[&quot;^16&quot;,[247,&quot;^R&quot;,&quot;&quot;,536870952]],[&quot;^16&quot;,[247,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[247,&quot;^F&quot;,255,536870952]],[&quot;^16&quot;,[247,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[247,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[247,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[247,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[247,&quot;^;&quot;,&quot;~u62d79f56-053e-48bd-93f2-e5e58a510ebd&quot;,536870952]],[&quot;^16&quot;,[248,&quot;^R&quot;,&quot;&quot;,536870952]],[&quot;^16&quot;,[248,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[248,&quot;^F&quot;,251,536870952]],[&quot;^16&quot;,[248,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[248,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[248,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[248,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[248,&quot;^;&quot;,&quot;~u62d79f56-77a2-4ec4-bf15-6242b152a95d&quot;,536870952]],[&quot;^16&quot;,[249,&quot;^R&quot;,&quot;&quot;,536870952]],[&quot;^16&quot;,[249,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[249,&quot;^F&quot;,259,536870952]],[&quot;^16&quot;,[249,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[249,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[249,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[249,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[249,&quot;^;&quot;,&quot;~u62d79f56-659b-4556-b9e6-093a3643da6d&quot;,536870952]],[&quot;^16&quot;,[250,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作尼耍斯沙拉&lt;/p&gt;\\n四季豆去头去尾，切五公分斜刀切，下去燙滾水加鹽数30秒，起来可泡冰水\\n生菜拨好泡冰水\\n馬鈴薯最好撥的狀態就是熱撥，用刀子刮皮就下來了，以滚刀法切成女生一口大小(滾刀法就是切成長條形，以後以東斜一刀西斜一刀的方式)\\n水煮蛋，加醋跟鹽，水滾後下煮七分鐘，起來泡冰水，起來十字對切\\n番茄切八瓣，也可以用小番茄\\n鯷魚可以用薄鹽腥鯖魚代替，烤過再放上去\\n橄榄切圆片\\n\\n製作油醋醬，油比醋三比一的比例，鹽巴1/4小茶匙，白黑胡椒跟糖都加一點點可能1/8小茶匙，先加30cc醋再加90cc橄欖油，用打蛋器打一打會稠融合在一起，可以试味道\\n擺盤，放生菜葉捏一捏比較堆疊，番茄，馬鈴薯，水煮蛋，斷生的四季豆&quot;,536870952]],[&quot;^16&quot;,[250,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[250,&quot;^F&quot;,248,536870952]],[&quot;^16&quot;,[250,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[250,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[250,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[250,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[250,&quot;^;&quot;,&quot;~u62d79f56-8edc-4274-9a2c-e292291c57ed&quot;,536870952]],[&quot;^16&quot;,[251,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作南瓜汤&lt;/p&gt;\\n挑选南瓜非常重要，東昇南瓜皮更薄，比栗子南瓜更香(南瓜子不要丟掉，可以拿來烤或者煮基礎高湯都可，很生的南瓜不要煮南瓜湯色跟味都會不好，判斷方法，南瓜蒂頭出現糖蜜的有香味的就對了，另外不建議買胡蘆型的)南瓜屬於蔬菜類的不是澱粉質食物，南瓜切大塊，各大块上面放一塊奶油鋁箔紙包起來175度烤三十分鐘，考到一汤匙戳到底，并且表面微微焦\\n南瓜湯好吃，处理南瓜要包鋁箔紙烤熟或者炒熟，不要用蒸的\\n\\n半片吐司切丁做濃湯吐司丁\\n南瓜汤洋蔥逆紋切片\\n紅蘿蔔切丁，蒂頭不要熬湯通常有藏沙子\\n芹菜尾切丁，也容易藏沙\\n60cc鮮奶油下面隔着冰水打發，當南瓜湯的裝飾\\n\\n开始炒料，培根切粗絲，熱鍋下兩大茶匙沙拉油炒培根，炒到恰恰(有点耐心)，用濾網濾油，放纸巾吸油备用拿培根油炒洋蔥，但是不要炒上色，只要软香就好\\n\\n同时可用锅子开始煮南瓜汤，冷鍋下30克奶油，奶油融化，火要小，炒紅蘿蔔，慢慢表皮熟的時候，都持續要小火。（如果怕麻煩時間太多，隨便生的丟進去直接煮湯一定很難吃）紅蘿蔔熟透叉子可以戳過就是透了，下上一步炒完的洋蔥培根油拌炒，也軟以後加入芹菜，月桂葉和前面旁邊用蔬菜餘料煮的蔬菜高湯（500cc的水煮各種蔬菜），烤好了的南瓜很香，就全部丟下去湯裡面，適度補高湯淹過食材兩公分，煮滾開始算小火煮30分鐘，稍微冷卻果汁機打5分鐘，濾網過濾，重新加熱開始調味，加鹽，補一點糖（老師版本不加雞精粉）(這狀態可以冷凍保存，蒸来喝的时候不用另外加水)，出菜前加入60CC鮮奶油到浓汤中搅匀，即可放上培根丝裝盤&quot;,536870952]],[&quot;^16&quot;,[251,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[251,&quot;^F&quot;,253,536870952]],[&quot;^16&quot;,[251,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[251,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[251,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[251,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[251,&quot;^;&quot;,&quot;~u62d79f56-0dd2-497b-ba1a-2e01ae9facb0&quot;,536870952]],[&quot;^16&quot;,[252,&quot;^R&quot;,&quot;&quot;,536870952]],[&quot;^16&quot;,[252,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[252,&quot;^F&quot;,250,536870952]],[&quot;^16&quot;,[252,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[252,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[252,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[252,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[252,&quot;^;&quot;,&quot;~u62d79f56-943b-4c41-9090-107a797c6b89&quot;,536870952]],[&quot;^16&quot;,[253,&quot;^R&quot;,&quot;&quot;,536870952]],[&quot;^16&quot;,[253,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[253,&quot;^F&quot;,257,536870952]],[&quot;^16&quot;,[253,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[253,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[253,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[253,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[253,&quot;^;&quot;,&quot;~u62d79f56-4edd-4b49-85dd-07a46fa8ba6a&quot;,536870952]],[&quot;^16&quot;,[254,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作炖饭&lt;/p&gt;\\n\\n蘑菇两三颗去掉根部，菇傘下緣往上撥上面傘面的皮，當生蘑菇裝飾，切厚片泡冰水减菌\\n洋蔥半颗切洋蔥碎，做肉丸跟燉飯的材料\\n蒜頭切成蒜碎\\n青豆仁熟的剝皮，開水燙過後，拌鹽跟橄欖油\\n泰國米洗完沥乾不要泡水，可能泡水不好控制炖饭时间(只有台灣人跟日本人在吃梗米，其他世界地方都是吃秈米(泰國米)\\n\\n番茄酱汁制作，一大茶匙的橄欖油，下洋蔥碎，炒香後下蒜碎、九層塔葉子，加一大茶匙的番茄糊，一小茶匙義大利綜合香料、60cc紅酒、360cc牛番茄打成泥的渣狀物、木匙搗碎後加240cc高湯，月桂葉一片，煮滾後大概15分鐘，收汁後果汁機打，熱打要注意不能蓋，打完會變橘紅色比原本的白一點點，回火上覆熱，下鹽跟白胡椒一點點調味完，肉丸子放進去，油也加進去，讓肉慢慢滾一下吃味道就可以關火泡著\\n\\n煮燉飯，下橄欖油，下洋蔥先炒，洋蔥透了，下蘑菇炒一下，下蒜頭，把米倒進來，下高湯大概跟米比例1:1，滾了以後關小火，十分鐘後打開大概會是乾鍋(但不应有锅巴)，這樣大概五六分熟而已，後續加240CC-360CC的番茄醬，加三大茶匙的起司粉，鹽巴黑胡椒白胡椒調味，加蛋黃，起鍋摆盘，可以下面拍盤子拍平，或者垫一块抹布，拿盘子撞桌子，平了後放上肉丸跟青豆跟生蘑菇（青豆蘑菇都拌橄欖油），再灑上起司粉\\n![image.png](../assets/image_1656906129870_0.png)&quot;,536870952]],[&quot;^16&quot;,[254,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[254,&quot;^F&quot;,247,536870952]],[&quot;^16&quot;,[254,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[254,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[254,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[254,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[254,&quot;^;&quot;,&quot;~u62d79f56-c6dc-4fa9-b504-985f07bf6541&quot;,536870952]],[&quot;^16&quot;,[255,&quot;^R&quot;,&quot;&lt;p style=\\&quot;font-weight:bold\\&quot;&gt;制作牛肉丸&lt;/p&gt;\\n半片土司切丁泡90cc牛奶，加新鮮吐司風味比加麵包粉好\\n九層塔大概1/2小茶匙，可以手捲一捲切絲然後剁碎\\n牛猪比3:1，牛豬絞肉抓均勻，用兩把中式菜刀採人字形將肉切縻，大概要剁15分鐘，有點黏稠感\\n![image.png](../assets/image_1656905998040_0.png)\\n開始准备塑型成肉丸，1/8小茶匙鹽加到肉糜裡可以生筋性（盐比肉大概1:100），下面放冰水隔水冰鎮，要一路砸出筋性才行，大概5分鐘差不多完成就可以離開冰水，加牛奶吐司、蒜碎、九層塔碎，1/4小茶匙奧立綱（五香粉台式也可以），黑胡椒，白胡椒都加一點點，一大茶匙起司粉，再捏一捏，加一大茶匙左右的蛋白汁液，肉團弄均勻，盤子跟手沾油，用湯匙一球球擠出來，用雙手上下丟的方式把肉丸整成圓形，(这种丸子煮煎烤都适合)\\n\\n煎丸子，只是要煎定型，不是為了讓他熟，稍後會放到番茄糊中燉煮，熱鍋要夠熱，冷油下一大茶匙沙拉油，下肉丸，一開始不要搖太大力會散，推一下讓肉丸離鍋，表面上色&quot;,536870952]],[&quot;^16&quot;,[255,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[255,&quot;^F&quot;,252,536870952]],[&quot;^16&quot;,[255,&quot;^Y&quot;,246,536870952]],[&quot;^16&quot;,[255,&quot;^V&quot;,246,536870952]],[&quot;^16&quot;,[255,&quot;^U&quot;,246,536870952]],[&quot;^16&quot;,[255,&quot;^18&quot;,true,536870952]],[&quot;^16&quot;,[255,&quot;^;&quot;,&quot;~u62d79f56-e86d-4674-b3e1-530a12445e02&quot;,536870952]],[&quot;^16&quot;,[256,&quot;^R&quot;,&quot;[[632_Cook_Recipe]] &lt;p style=\\&quot;color:grey\\&quot;&gt;第五堂課20220702鄉村南瓜濃湯 尼耍斯沙拉 牛肉丸茄汁燉飯&lt;/p&gt;&quot;,536870952]],[&quot;^16&quot;,[256,&quot;^P&quot;,&quot;^17&quot;,536870952]],[&quot;^16&quot;,[ e_Excel&quot;],536870982]],[&quot;^16&quot;,[274,&quot;^B&quot;,1655451093627,536871021]],[&quot;^16&quot;,[274,&quot;^;&quot;,&quot;~u62d79f57-5218-4021-b25f-f9fc6ad77870&quot;,536870982]],[&quot;^16&quot;,[275,&quot;^R&quot;,&quot;[[22_Code_Skill]]\\nhttps://www.jianshu.com/p/36342812cd3a\\ngit command material\\n![截圖 2022-05-25 00.05.27.png](../assets/截圖_2022-05-25_00.05.27_1653408330557_0.png){:height 32, :width 247}\\n建立資料夾 ＝建立目錄\\npwd 查詢目前資料夾位置\\n![截圖 2022-05-25 00.07.42.png](../assets/截圖_2022-05-25_00.07.42_1653408465860_0.png)\\n用ls -al可以查詢檔案存在與否\\n![截圖 2022-05-25 00.09.42.png](../assets/截圖_2022-05-25_00.09.42_1653408585894_0.png){:height 183, :width 707}\\n原本東西都放在本地的工作目\\ngit add index.html --&gt; 將index.html放到暫存區\\ngit status 可以查詢目前狀態 add 完以後就變成new files 放到暫存區\\ngit commit -m \\&quot;add index\\&quot; --&gt;commit 加上註記備註，放到本地的repository\\ngit push\\ngit log可以看commit紀錄，了解版本紀錄\\ngit log --one line可以看commit紀錄精簡版\\nls -al 可以查看目前資料夾內檔案狀況\\nrm *.html 刪除資料夾內所有html檔案\\n![截圖 2022-05-26 01.18.11.png](../assets/截圖_2022-05-26_01.18.11_1653499095435_0.png)\\ngit check out index.html 可以在commit前把檔案救回來\\ngit checkout .  把這資料夾裡面的東西都救回來 .git/從這個版控裡面找回來\\ngit blame index.html 可以查看index.html 每一行code 是誰寫的\\nmkdir hello-world建立資料夾\\n建立完後打git status 看不見建立出來的hello-world資料夾，因為git 是用檔案內容做計算的，但空的資料夾是空的，git讀取不到\\n如果真的想要將那個空資料夾呈現在git 中\\n![截圖 2022-05-26 01.24.44.png](../assets/截圖_2022-05-26_01.24.44_1653499704092_0.png)\\ntouch hello-world/ .keep 代表如果hello-world存在，就去戳一下改變時間戳記，如果不存在就去產生\\n通常在作業系統裡面 .keep這種檔案代表隱藏檔，不一定有用但平常也不用看到就可以這樣操作\\ngit的世界commit才是本體，分支只是標籤浮雲\\ngit branch 可以看到分支\\ngit branch cat 創造一個cat的分支\\ngit checkout cat 切換分支到cat分支，head標籤移動\\ngit checkout master 切換回主線分支\\ngit merge cat 將cat 分支合併進去（如果是一直線的那種分支，則master會fast-forward到跟cat相同的commit）\\ngit branch -d cat 刪除cat分支（把標籤貼紙撕起來）\\n\\nrebase 換根基\\n![截圖 2022-05-26 23.43.03.png](../assets/截圖_2022-05-26_23.43.03_1653579785093_0.png)\\n\\ngit rebase cat 把dog分支換base到cat的一系列系統操作\\n![截圖 2022-05-26 23.44.08.png](../assets/截圖_2022-05-26_23.44.08_1653579851054_0.png)\\n最後C6 C7會在系統裡面被淡化，看不見，沒有真實的刪除COMMIT\\n\\nrebase合併以後比較適合過多節點的分支，比較乾淨簡潔\\n如果用merge的那種分支可以看出Ｙ型的脈絡\\n\\nreset指令 比較像是become的概念\\ngit 的世界裡面 沒有刪除commit的指令！！\\ngit reset 9a2995的時候可以回到那個版本，末端枝節的版本就會暫時淡化看不見\\n![截圖 2022-05-26 23.52.07.png](../assets/截圖_2022-05-26_23.52.07_1653580329297_0.png)\\n\\n![截圖 2022-05-26 23.50.46.png](../assets/截圖_2022-05-26_23.50.46_1653580248963_0.png)\\ngit reset 9a2995 --hard 從c5 要退回c4\\n此時C5分支會被隱藏起來，但實際上沒有真的不見\\nreflog = reference log --&gt;可以用這個方式找到C5的分支\\ngit reflog\\ngit reset f8458a --hard 回到C5分支\\n![截圖 2022-05-26 23.54.53.png](../assets/截圖_2022-05-26_23.54.53_1653580496057_0.png)\\n![截圖 2022-05-26 23.58.01.png](../assets/截圖_2022-05-26_23.58.01_1653580685833_0.png)\\n這邊如果剛剛reset一個分支\\ba7，回到a6，但頁面上又看不到a7了想reset回a7，用reflog可以找到e12d8ef\\n\\n以上講的是絕對定位\\n下面是相對定位^\\n  = caret~\\n  = talde\\ngit reset f8458a^ 回到他的上一個狀態\\ngit reset head~2 我要倒回head標籤之前兩個的版本\\ngit reset head^ 回到目前標籤的上一個狀態\\n\\nreset 跟checkout的差異\\n![截圖 2022-05-27 00.03.24.png](../assets/截圖_2022-05-27_00.03.24_1653581006684_0.png)\\n![截圖 2022-05-28 00.29.02.png](../assets/截圖_2022-05-28_00.29.02_1653668945008_0.png)\\n有跳提示的時候代表有末端分支沒處理，刪除要改用-D\\ngit branch newnew_dog 053fb21  如果我們有之前的分支代號，也可以創建新分支到當初的那隻分支狀態，只要能找到分支代號，就一定可以把砍掉被隱藏起來的未合併分支救回來(分支代號都可以用reflog找到)\\n\\ncherry pick 用來挑選某個commit加進來而不merge整個分支，舉例如果想要把dolphin 加入dog合併\\n![截圖 2022-05-28 00.36.41.png](../assets/截圖_2022-05-28_00.36.41_1653669403760_0.png)\\n![截圖 2022-05-28 00.37.31.png](../assets/截圖_2022-05-28_00.37.31_1653669453446_0.png){:height 529, :width 791}&quot;,536870966]],[&quot;^16&quot;,[275,&quot;^P&quot;,&quot;^17&quot;,536870966]],[&quot;^16&quot;,[275,&quot;^F&quot;,271,536870966]],[&quot;^16&quot;,[275,&quot;^Y&quot;,271,536870966]],[&quot;^16&quot;,[275,&quot;^V&quot;,271,536870966]],[&quot;^16&quot;,[275,&quot;^U&quot;,132,536870966]],[&quot;^16&quot;,[275,&quot;^U&quot;,271,536870966]],[&quot;^16&quot;,[275,&quot;^H&quot;,132,536870966]],[&quot;^16&quot;,[275,&quot;^18&quot;,true,53687
